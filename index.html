<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGM Group Note</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; display: flex; flex-direction: column; height: 100vh; }
        header { background: #1f1f1f; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .group-controls { display: flex; gap: 10px; }
        input { background: #2c2c2c; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; outline: none; }
        button { background: #d32f2f; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #b71c1c; }
        #user-info { display: flex; align-items: center; gap: 10px; font-size: 14px; }
        #user-info img { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #f40606; }
        
        main { flex: 1; padding: 20px; position: relative; }
        textarea { 
            width: 100%; height: 100%; box-sizing: border-box;
            background: #1a1a1a; color: #00ff41; border: 1px solid #333;
            padding: 20px; font-size: 18px; line-height: 1.6;
            resize: none; outline: none; border-radius: 10px;
            font-family: 'Courier New', Courier, monospace;
        }
        .status { position: absolute; bottom: 30px; right: 40px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<header>
    <div class="group-controls">
        <input type="text" id="group-id" placeholder="Nhập tên Nhóm..." value="chung">
        <button id="join-btn">Vào Nhóm</button>
    </div>
    <div id="user-info">
        <span id="user-name">Đang chờ đăng nhập...</span>
        <button id="login-btn">Login Google</button>
    </div>
</header>

<main>
    <textarea id="note-area" placeholder="Gõ nội dung nhóm tại đây..."></textarea>
    <div class="status" id="status">Đã đồng bộ</div>
</main>

<script type="module">
    // --- 1. SETUP FIREBASE ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // THAY THẾ ĐOẠN NÀY BẰNG CONFIG CỦA ÔNG
    const firebaseConfig = {
        apiKey: "AIzaSyDmInMuVwctHRLSsgQM0xNJg0otLqDedrQ",
        authDomain: "tgmchat-3f4e8.firebaseapp.com",
        databaseURL: "https://tgmchat-3f4e8-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "tgmchat-3f4e8",
        storageBucket: "tgmchat-3f4e8.firebasestorage.app",
        messagingSenderId: "105092144696",
        appId: "1:105092144696:web:34f4b150f48990ceaf50cd",
        measurementId: "G-9PJN94WTS8"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const textarea = document.getElementById('note-area');
    const groupInput = document.getElementById('group-id');
    const statusDiv = document.getElementById('status');
    let currentGroup = "chung";
    let typingTimer;

    // --- 2. LOGIC ĐĂNG NHẬP ---
    document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('user-info').innerHTML = `
                <span>${user.displayName}</span>
                <img src="${user.photoURL}">
            `;
            startSync(); // Đăng nhập xong mới bắt đầu đồng bộ
        }
    });

    // --- 3. LOGIC ĐỒNG BỘ NHÓM ---
    function startSync() {
        const noteRef = ref(db, 'groups/' + currentGroup);

        // Lắng nghe dữ liệu từ Firebase
        onValue(noteRef, (snapshot) => {
            const data = snapshot.val();
            if (data !== null && data !== textarea.value) {
                textarea.value = data;
                if (document.hidden) {
                    new Notification("Nhóm " + currentGroup + " có tin mới!");
                }
            }
            statusDiv.innerText = "Đã đồng bộ nhóm: " + currentGroup;
        });
    }

    // Gõ phím là lưu (Debounce 500ms)
    textarea.addEventListener('input', () => {
        statusDiv.innerText = "Đang lưu...";
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => {
            set(ref(db, 'groups/' + currentGroup), textarea.value);
            statusDiv.innerText = "Đã lưu!";
        }, 500);
    });

    // Đổi nhóm
    document.getElementById('join-btn').onclick = () => {
        currentGroup = groupInput.value.trim() || "chung";
        textarea.value = "Đang tải dữ liệu nhóm...";
        startSync();
    };

    // Xin quyền thông báo
    if (Notification.permission === "default") {
        Notification.requestPermission();
    }
</script>

</body>
</html>
